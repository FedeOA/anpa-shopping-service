# Nombre del servicio para identificacion dentro del ecosistema.
spring.application.name=anpa-shopping-service

# Configuracion de la base de datos.
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://192.168.2.13:33060/anpa_shopping_service_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=MYSQL2011
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql:true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Puerto donde se levantara el servidor.
server.port=8093

# Actuator (Inicio)

# Se exponen todos los endpoints disponibles (/actuator/health, /actuator/metrics, /actuator/beans, etc.).
# Sin esta propiedad, solo los endpoints health y info estan expuestos por defecto.
management.endpoints.web.exposure.include=*

# Actuator (Fin)