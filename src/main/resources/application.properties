# Nombre del servicio para identificacion dentro del ecosistema.
spring.application.name=anpa-shopping-service

# Configuracion de la base de datos.
spring.jpa.hibernate.ddl-auto=update
spring.datasource.url=jdbc:mysql://localhost:3306/anpa_shopping_service_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.show-sql:true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Actuator (Fin)

# Discovery (Inicio)

# Puerto donde se levantara el servidor.
# El valor "0" permite que el sistema operativo asigne un puerto aleatorio.
server.port=0

# Configuracion para la instancia del cliente Eureka (Service Discovery).
# Se utiliza para registrar la aplicacion en el servidor Eureka.
# El "instance-id" se genera dinamicamente combinando el nombre de la aplicacion y un valor aleatorio.
eureka.instance.instance-id=${spring.application.name}:${random.value}

# Discovery (Fin)